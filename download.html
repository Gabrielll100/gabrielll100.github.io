    background:#00ff99;
    color:#000;
    padding:15px 25px;
    border-radius:10px;

    font-weight:bold;
    display:inline-block;
    margin-top:20px;
}

.hidden{
    display:none;
}

<!-- Adsense -->

crossorigin="anonymous"></script>

</head>

<body>

<h2>🚀 Preparando tu descarga...</h2>
<p>Tu archivo estará listo en <span id="count">8</span> segundos</p>

<!-- 🔥 ANUNCIO ARRIBA -->
<div style="margin:20px;">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6972125988436418"

     data-ad-format="auto"></ins>

<!-- BOTÓN OCULTO -->

<!-- 🔥 ANUNCIO ABAJO -->
<div style="margin:20px;">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6972125988436418"
     data-ad-slot="9057823826"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
let time = 8;
let count = document.getElementById("count");
let btn = document.getElementById("downloadBtn");

let timer = setInterval(()=>{
    time--;
    count.innerText = time;

    if(time <= 0){
        clearInterval(timer);
        btn.classList.remove("hidden");
    }
},1000);
    
    btn.onclick = function(){
    setTimeout(()=>{
        window.location.href="gracias.html";
    }, 3000);
};

</script>
