    font-size:40px;

<body>

<h2>🚀 Preparando descarga...</h2>

<div id="contador">5</div>

<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6972125988436418"

     data-ad-format="auto"></ins>
<script>
(adsbygoogle = window.adsbygoogle || []).push({});

<a id="btnDownload" class="btn" href="#">Descargar ahora</a>

<script>
let tiempo = 5;
let contador = document.getElementById("contador");
let boton = document.getElementById("btnDownload");

let intervalo = setInterval(() => {
    tiempo--;
    contador.innerHTML = tiempo;

    if(tiempo <= 0){
        clearInterval(intervalo);
        boton.style.opacity = "1";
        boton.href = "https://www.appcreator24.com/app4101108-ruxlj5";

        // redirección automática
        window.location.href = "https://www.appcreator24.com/app4101108-ruxlj5";
    }
}, 1000);
</script>
